[package]
name = "os_sdcard"
version = "0.1.0"
authors = ["Sangyoon21 <sangyoon@andrew.cmu.edu>"]
edition = "2021"

[dependencies]
cortex-m = "0.7.7"                # <-- NO features here
cortex-m-rt = "0.7.5"
defmt = "1.0.1"
defmt-rtt = "1.0.0"
embedded-hal = "0.2.7"
panic-probe = { version = "1.0.0", features = ["print-defmt"] }
rp-pico = { version = "0.9.0" }   # its rp2040-hal already enables critical-section-impl
rp2040-boot2 = "0.3.0"



[profile.release]
debug = 2
