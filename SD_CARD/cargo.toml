[package]
name = "os_sdcard"
version = "0.1.0"
edition = "2021"
authors = ["Sangyoon21 <sangyoon@andrew.cmu.edu>"]

[dependencies]
# Board + HAL
rp-pico       = "0.9.0"
rp2040-hal    = "0.10.2"

# Core Cortex-M crates (NO critical-section features!)
cortex-m      = "0.7.7"
cortex-m-rt   = "0.7.3"

# Boot2 blob for RP2040
rp2040-boot2  = "0.3.0"

# Embedded HAL (v1.0) + helpers
embedded-hal      = "1.0.0"
embedded-hal-bus  = "0.3.0"
embedded-sdmmc    = "0.9.0"

# Logging and panic
defmt        = "0.3"
defmt-rtt    = "0.4"
panic-probe  = { version = "0.3", features = ["print-defmt"] }

# (Optional) if you had it before:
# critical-section = "1.2.0"

[profile.release]
debug = 2
